name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build, Lint & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Configure git for tests
        run: |
          git config --global user.email "ci@vigil.dev"
          git config --global user.name "CI"

      - run: npm ci

      - run: npm run build

      - run: npx biome check .

      - run: npm test
